services:
  migration:
    image: deanayalon/fms-migration
    container_name: fms-migration
    build:
      context: .
      target: develop
    env_file: .env
    tty: true
    ports:
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./staging:/app/staging
      - ~/.aws:/root/.aws:ro
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./requirements.txt